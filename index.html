<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width">
    <title>Travel Checker</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">
                <span class="icon">✈️</span>
                <h1>Travel Checker</h1>
            </div>
            <nav class="pill-nav">
                <button class="nav-btn active" onclick="switchTab('dashboard', this)">Dashboard</button>
                <button class="nav-btn" onclick="switchTab('compare', this)">Compare</button>
                <button class="nav-btn" onclick="switchTab('timezone', this)">Time Zones</button>
            </nav>
        </header>

        <main id="dashboardTab" class="tab-content active">
            
            <section class="search-section">
                <div class="search-box-container">
                    <div class="search-box">
                        <input type="text" id="cityInput" placeholder="Where are you heading?" autocomplete="off">
                        <button class="main-btn" onclick="fetchAllData(document.getElementById('cityInput').value)">Search</button>
                    </div>
                    <div id="suggestions" class="suggestions-list"></div>
                </div>
            </section>

            <div class="stack-layout">
                <div class="card weather-hero" id="weatherResult">
                    <div class="card-header"><h3>Destination Weather</h3></div>
                    <div id="weatherContent" class="hero-content">Search a city to see live metrics...</div>
                </div>

                <div class="card currency-section" id="currencyResult">
                    <div class="card-header">
                        <h3>Currency Converter</h3>
                    </div>
                    <div class="converter-interface">
                        <div class="input-group">
                            <label>Amount</label>
                            <input type="number" id="convertAmount" value="1" oninput="calculateConversion()">
                        </div>
                        
                        <div class="conversion-controls">
                            <select id="baseCurrency" onchange="calculateConversion()">
                                <option value="USD" selected>USD</option>
                                <option value="MYR">MYR</option>
                                <option value="JPY">JPY</option>
                                <option value="EUR">EUR</option>
                                <option value="GBP">GBP</option>
                                <option value="AUD">AUD</option>
                            </select>
                            
                            <button class="swap-btn" onclick="swapCurrencies()" title="Swap Currencies">⇄</button>
                            
                            <select id="targetCurrency" onchange="calculateConversion()">
                                <option value="" selected disabled>Select Target</option>
                                <option value="JPY">JPY</option>
                                <option value="USD">USD</option>
                                <option value="MYR">MYR</option>
                                <option value="EUR">EUR</option>
                                <option value="GBP">GBP</option>
                                <option value="AUD">AUD</option>
                            </select>
                        </div>

                        <div class="result-display">
                            <span id="displayAmount">1.00</span> <span id="displayBase">USD</span> = 
                            <h2 id="convertedValue">--</h2>
                        </div>
                    </div>
                    <canvas id="currencyChart"></canvas>
                </div>
            </div>
        </main>

        <main id="compareTab" class="tab-content">
            <section class="card comparison-tool">
                <h2>Travel Comparison</h2>
                <div class="compare-inputs">
                    <input type="text" id="city1" placeholder="City A">
                    <span class="vs">VS</span>
                    <input type="text" id="city2" placeholder="City B">
                </div>
                <button class="compare-btn" onclick="compareSystems()">Run Comparison</button>
                <div id="compareResult" class="compare-grid"></div>
            </section>
        </main>

        <main id="timezoneTab" class="tab-content">
            <section class="card">
                <h2>Time Zone Explorer</h2>
                <div class="compare-inputs">
                    <input type="text" id="tzCity1" placeholder="Home City">
                    <span class="vs">&</span>
                    <input type="text" id="tzCity2" placeholder="Travel City">
                </div>
                <button class="compare-btn" onclick="compareTimeZones()">Compare Local Times</button>
                <div id="timezoneResult" class="timezone-display"></div>
            </section>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
