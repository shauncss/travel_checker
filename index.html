<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel Checker</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="container">
        
        <div class="card top-card">
            <div class="logo">
                <span class="icon">✈️</span>
                <h2>Travel Setup</h2>
            </div>
            
            <div class="selectors">
                <div class="input-group">
                    <label>Home Country</label>
                    <select id="homeCountry"></select>
                </div>
                <div class="input-group">
                    <label>Destination Country</label>
                    <select id="destCountry">
                        <option value="" disabled selected>Select Country</option>
                    </select>
                </div>
            </div>
            <button class="main-btn" onclick="runComparison()">Compare</button>
        </div>

        <div class="card bottom-card" id="resultsCard" style="display: none;">
            <nav class="pill-nav">
                <button class="nav-btn active" onclick="switchTab('currency', this)">Currency</button>
                <button class="nav-btn" onclick="switchTab('weather', this)">Weather</button>
                <button class="nav-btn" onclick="switchTab('timezone', this)">Time Zone</button>
            </nav>

            <main id="currencyTab" class="tab-content active">
                <div class="converter-interface">
                    <div class="conversion-row">
                        <input type="number" id="convertAmount" value="1" oninput="updateCurrencyDisplay()">
                        <span id="baseCurrencyLabel" class="currency-label">USD</span>
                        <span class="equals">=</span>
                        <h2 id="convertedValue">--</h2>
                        <span id="targetCurrencyLabel" class="currency-label">EUR</span>
                    </div>
                </div>
                <div class="chart-container">
                    <canvas id="currencyChart"></canvas>
                </div>
            </main>

            <main id="weatherTab" class="tab-content">
                <div class="compare-inputs">
                    <input type="text" id="weatherCity1" placeholder="City 1">
                    <span class="vs">VS</span>
                    <input type="text" id="weatherCity2" placeholder="City 2">
                    <button class="small-btn" onclick="compareWeather()">Check</button>
                </div>
                <div id="weatherResult" class="compare-grid"></div>
            </main>

            <main id="timezoneTab" class="tab-content">
                <div class="compare-inputs">
                    <input type="text" id="tzCity1" placeholder="City 1">
                    <span class="vs">&</span>
                    <input type="text" id="tzCity2" placeholder="City 2">
                    <button class="small-btn" onclick="compareTimezones()">Check</button>
                </div>
                <div id="timezoneResult" class="compare-grid"></div>
            </main>
        </div>

    </div>
    <script src="script.js"></script>
</body>
</html>
